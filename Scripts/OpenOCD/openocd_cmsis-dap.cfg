# OpenOCD CMSIS-DAP Interface Configuration
# Using SWD (Serial Wire Debug) protocol

transport select swd

# CMSIS-DAP adapter configuration (auto-detect any CMSIS-DAP device)
adapter driver cmsis-dap

# SWD speed (kHz)
adapter speed 4000

# Reset configuration
reset_config srst_only srst_nogate connect_assert_srst
