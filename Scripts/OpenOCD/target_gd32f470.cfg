# GD32F4XX OpenOCD Target Configuration

# Set script search path
set SCRIPT_DIR D:/Projecrt/ERDP/Scripts/OpenOCD

# Chip configuration
set CHIPNAME gd32f470
set CPUTAPID 0x2ba01477

# Work area size (RAM for flash programming) - 16KB
set WORKAREASIZE 0x4000

# Flash size (2048KB for GD32F470ZI)
set FLASH_SIZE 0x200000

# Source OpenOCD built-in target config
source [find target/gd32f4xx.cfg]

# Initialization
init
reset halt
