# STM32F4XX OpenOCD Target Configuration

# Set script search path
set SCRIPT_DIR D:/Projecrt/ERDP/Scripts/OpenOCD

# Chip configuration
set CHIPNAME stm32f407
set CPUTAPID 0x2ba01477

# Work area size (RAM for flash programming)
set WORKAREASIZE 0x8000

# Source OpenOCD built-in target config
source [find target/stm32f4x.cfg]

# Initialization
init
reset halt
