# OpenOCD Configuration for GD32F470 with STLink v2 (SWD)
# 烧录器: STLink v2
# 接口: SWD
# 芯片: GD32F470ZI

source [find interface/stlink.cfg]
transport select hla_swd
source [find target/gd32f4xx.cfg]

# GD32 + STLink 在擦写后容易出现链路不稳定，进一步降低 SWD 频率
adapter speed 400

# 使用与 STM32 类似的复位策略，避免因 reset 线策略导致无法 halt
reset_config srst_nogate
adapter srst delay 100

# 在 GDB 附着和擦写前显式 halt，避免 vFlashErase 阶段目标未停机
$_TARGETNAME configure -event gdb-attach {
    halt
}
$_TARGETNAME configure -event gdb-flash-erase-start {
    halt
}
